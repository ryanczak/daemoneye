# The default model used for all interactive chat sessions.
# Add additional [models.<name>] sections to define alternatives selectable
# via the /model slash command.  Ghost shell runbooks may specify a model
# by name in their frontmatter with `model: <name>`.
[models.default]
provider = "anthropic"
api_key  = ""
model    = "claude-sonnet-4-6"

# --- Additional model examples ---
# [models.opus]
# provider = "anthropic"
# model    = "claude-opus-4-6"
#
# [models.local]
# provider  = "ollama"
# model     = "llama3.2"
# base_url  = "http://localhost:11434/v1"
# context_window_tokens = 8192
#
# [models.gpt]
# provider = "openai"
# model    = "gpt-4o"
#
# --- Optional: a cheap model for background narrative summarization ---
# Only used when [digest].narrative_enabled = true (see below).  Falls back
# to [models.default] if omitted.  Pick a cheap/fast model — Haiku 4.5,
# gpt-4o-mini, gemini-2.5-flash.
# [models.digest]
# provider = "anthropic"
# model    = "claude-haiku-4-5-20251001"

[ai]
prompt = "sre"

# [context]
# Declare the operating environment so the AI calibrates its advice accordingly.
# Values: "personal" | "development" | "staging" | "production"
# environment = "personal"

# [masking]
# Add org-specific patterns to redact before context is sent to the AI.
# Built-in patterns (AWS keys, JWTs, DB URLs, private keys, etc.) always run.
# extra_patterns = ["MYCO-[A-Z0-9]{32}", "sk_live_[A-Za-z0-9]{32}"]

# [notifications]
# Shell command to run when a watchdog alert fires.
# Available env vars: $DAEMONEYE_JOB (job name), $DAEMONEYE_MSG (alert message).
# on_alert = "notify-send '$DAEMONEYE_JOB' '$DAEMONEYE_MSG'"

# [webhook]
# enabled = false
# port = 9393
# secret = ""            # Bearer token; empty = no auth
# auto_analyze = true
# severity_threshold = "warning"   # "info" | "warning" | "critical"
# dedup_window_secs = 300
# bind_addr = "127.0.0.1"          # "0.0.0.0" to accept from all interfaces

# [limits]
# per_tool_batch            = 100    # max consecutive calls of one non-approval tool per turn (0 = unlimited)
# total_tool_calls_per_turn = 0      # max total non-approval tool calls per turn (0 = unlimited)
# tool_result_chars         = 16000  # max chars fed back to the AI per tool result (0 = unlimited)
# max_history               = 80     # max messages kept in session history (0 = unlimited)
# max_turns                 = 0      # max AI turns per chat session (0 = unlimited; ghosts use max_ghost_turns)
# max_tool_calls_per_session = 0     # cumulative non-approval tool calls per session (0 = unlimited)

# [limits.per_tool]
# read_file         = 200   # override per_tool_batch for this tool only (0 = unlimited for this tool)
# search_repository = 50

# [ghost]
# max_ghost_turns = 20   # hard ceiling; individual runbooks may set lower

# [daemon]
# tmux_session = "daemoneye"   # session the daemon creates/adopts when launched outside tmux
#                              # (default is "daemoneye"; override to use a different name)

# [digest]
# Session-compaction settings.  The structured digest (event tallies and
# artifact scans) always runs when token pressure crosses the digest
# threshold; the narrative step is opt-in because it costs one extra API
# call per compaction.
# narrative_enabled = false    # set to true to prepend an AI-generated
#                              # natural-language summary of the compacted
#                              # turns to each digest.  Uses [models.digest]
#                              # if defined, otherwise [models.default].

# [approvals]
# Controls which action classes auto-approve at the start of every chat
# session.  All defaults preserve the original behaviour — only `commands`
# starts as true because non-sudo commands are bounded by OS file permissions.
# Individual approvals can always be revoked at runtime with /approvals revoke.
# `revoke` always fully gates, regardless of these defaults.
#
# commands      = true   # non-sudo terminal commands (default: true)
# sudo          = false  # sudo terminal commands (default: false)
# scripts       = false  # all write_script calls (default: false)
# runbooks      = false  # all write_runbook calls (default: false)
# file_edits    = false  # all edit_file calls (default: false)
# ghost_commands = false # ghost shell non-sudo commands without auto_approve_scripts
#                        # (can also be set per-runbook: auto_approve_commands: true)
